name: Build

on:
  push:
    branches: [master, dev-rmlui]
    tags: ['v*']
  pull_request:
    branches: [master, dev-rmlui]
  workflow_dispatch:

env:
  GODOT_CPP_VERSION: godot-4.5-stable
  RMLUI_REPO: Brokenchin/RmlUi-multicontext
  RMLUI_BRANCH: multicontext_experiment

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x86_64
            cmake_generator: "Visual Studio 17 2022"
            cmake_arch: "-A x64"
          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            cmake_generator: "Unix Makefiles"
            cmake_arch: ""
          - os: macos-latest
            platform: macos
            arch: universal
            cmake_generator: "Unix Makefiles"
            cmake_arch: '-DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"'

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone godot-cpp
        run: |
          git clone https://github.com/godotengine/godot-cpp.git -b ${{ env.GODOT_CPP_VERSION }} --depth 1 dependencies/godot-cpp

      - name: Clone RmlUi
        run: |
          git clone https://github.com/${{ env.RMLUI_REPO }}.git -b ${{ env.RMLUI_BRANCH }} --depth 1 dependencies/RmlUi

      - name: Configure (Debug)
        run: >
          cmake -B build-debug
          -G "${{ matrix.cmake_generator }}" ${{ matrix.cmake_arch }}
          -DCMAKE_BUILD_TYPE=Debug
          -DRMLUI_GODOT_STANDALONE=ON
          -DRMLUI_SAMPLES=OFF
          -DRMLUI_FONT_ENGINE=none
          -DRMLUI_LUA_BINDINGS=OFF
          -DRMLUI_LOTTIE_PLUGIN=OFF
          -DRMLUI_SVG_PLUGIN=OFF
          -DRMLUI_CUSTOM_RTTI=ON

      - name: Build (Debug)
        run: cmake --build build-debug --config Debug --parallel

      - name: Configure (Release)
        run: >
          cmake -B build-release
          -G "${{ matrix.cmake_generator }}" ${{ matrix.cmake_arch }}
          -DCMAKE_BUILD_TYPE=Release
          -DRMLUI_GODOT_STANDALONE=ON
          -DRMLUI_SAMPLES=OFF
          -DRMLUI_FONT_ENGINE=none
          -DRMLUI_LUA_BINDINGS=OFF
          -DRMLUI_LOTTIE_PLUGIN=OFF
          -DRMLUI_SVG_PLUGIN=OFF
          -DRMLUI_CUSTOM_RTTI=ON

      - name: Build (Release)
        run: cmake --build build-release --config Release --parallel

      - name: List output
        run: ls -la project/addons/rmlui-godot/bin/ || true
        shell: bash

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: rmlui-godot-${{ matrix.platform }}-${{ matrix.arch }}
          path: project/addons/rmlui-godot/bin/
          if-no-files-found: error

  package:
    needs: build
    runs-on: ubuntu-latest
    name: Package addon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Assemble addon
        run: |
          mkdir -p dist/addons/rmlui-godot/bin
          cp project/addons/rmlui-godot/rmlui_godot.gdextension dist/addons/rmlui-godot/
          cp project/addons/rmlui-godot/plugin.cfg dist/addons/rmlui-godot/
          cp project/addons/rmlui-godot/base.rcss dist/addons/rmlui-godot/

          # Copy all platform binaries into single bin/ folder
          for dir in artifacts/rmlui-godot-*/; do
            cp -v "$dir"/* dist/addons/rmlui-godot/bin/ 2>/dev/null || true
          done

          ls -la dist/addons/rmlui-godot/bin/

      - name: Upload addon package
        uses: actions/upload-artifact@v4
        with:
          name: rmlui-godot-addon
          path: dist/

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Create release
    permissions:
      contents: write

    steps:
      - name: Download addon package
        uses: actions/download-artifact@v4
        with:
          name: rmlui-godot-addon
          path: rmlui-godot-addon/

      - name: Zip addon
        run: |
          cd rmlui-godot-addon
          zip -r ../rmlui-godot-${{ github.ref_name }}.zip addons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: rmlui-godot-${{ github.ref_name }}.zip
          generate_release_notes: true
